name: Thu thập tin đất Nam Ban (miễn phí)

on:
  schedule:
    # 00:20 UTC = 07:20 sáng giờ VN mỗi ngày
    - cron: '20 0 * * *'
  workflow_dispatch:   # bấm chạy tay từ tab Actions

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Đọc sàn & bóc tin thô
        run: node scripts/scrape-listings.mjs
      - name: Commit tin thô (nếu có)
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add data/tin-thu-thap/
          git diff --staged --quiet || git commit -m "chore: thu thập tin đất Nam Ban $(date +'%Y-%m-%d') [skip ci]"
          git push
