name: Weekly Feed Rebuild

on:
  schedule:
    # Every Monday 07:00 UTC = 14:00 Vietnam time
    - cron: '0 7 * * 1'
  workflow_dispatch:  # Allow manual trigger from GitHub Actions tab

jobs:
  rebuild-feed:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Rebuild RSS feed
        run: node scripts/build-feed.mjs

      - name: Commit and push if changed
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add feed.xml
          git diff --staged --quiet || git commit -m "chore: weekly feed rebuild $(date +'%Y-%m-%d') [skip ci]"
          git push
