<svg xmlns="http://www.w3.org/2000/svg" width="400" height="260" viewBox="0 0 400 260">
  <defs>
    <linearGradient id="sky8" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#FDB97D"/><stop offset="50%" stop-color="#F4A460"/><stop offset="100%" stop-color="#87CEEB"/></linearGradient>
    <linearGradient id="hill8" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#4A8C5C"/><stop offset="100%" stop-color="#1A3D2B"/></linearGradient>
  </defs>
  <rect width="400" height="260" fill="url(#sky8)"/>
  <!-- Mountains -->
  <polygon points="0,200 80,80 160,200" fill="url(#hill8)"/>
  <polygon points="100,200 200,60 300,200" fill="#3A7D44"/>
  <polygon points="240,200 340,90 400,200" fill="#2E5C40"/>
  <!-- Tea fields -->
  <rect x="0" y="200" width="400" height="60" fill="#4A8C5C"/>
  <ellipse cx="100" cy="200" rx="80" ry="20" fill="#5CA06A"/>
  <ellipse cx="300" cy="200" rx="80" ry="20" fill="#5CA06A"/>
  <!-- Road -->
  <rect x="160" y="200" width="80" height="60" fill="#C8B89A"/>
  <line x1="200" y1="200" x2="200" y2="260" stroke="white" stroke-width="2" stroke-dasharray="8,5"/>
  <!-- Land marker -->
  <rect x="145" y="125" width="110" height="52" rx="6" fill="#1A3D2B" opacity="0.9"/>
  <text x="200" y="146" text-anchor="middle" font-family="sans-serif" font-size="13" fill="white" font-weight="700">975m² · 1,729 tỷ</text>
  <text x="200" y="166" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#C9A84C">200m² thổ cư · Mặt đường 21m</text>
  <rect x="160" y="178" width="80" height="18" rx="4" fill="#C9A84C"/>
  <text x="200" y="191" text-anchor="middle" font-family="sans-serif" font-size="10" fill="white" font-weight="700">Nam Ban · Chính chủ</text>
</svg>
