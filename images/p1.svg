<svg xmlns="http://www.w3.org/2000/svg" width="800" height="530" viewBox="0 0 800 530">
  <defs>
    <linearGradient id="sky1" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#7BC8E8"/><stop offset="100%" stop-color="#C5E8F7"/></linearGradient>
    <linearGradient id="hill1" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#2D6A4F"/><stop offset="100%" stop-color="#1B4332"/></linearGradient>
    <linearGradient id="hill2" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#40916C"/><stop offset="100%" stop-color="#2D6A4F"/></linearGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#8B4513"/><stop offset="100%" stop-color="#6B3410"/></linearGradient>
    <linearGradient id="overlay" x1="0" y1="1" x2="0" y2="0"><stop offset="0%" stop-color="rgba(0,0,0,0.65)"/><stop offset="50%" stop-color="rgba(0,0,0,0.1)"/><stop offset="100%" stop-color="rgba(0,0,0,0)"/></linearGradient>
  </defs>
  <rect width="800" height="530" fill="url(#sky1)"/>
  <!-- clouds -->
  <ellipse cx="150" cy="90" rx="80" ry="28" fill="white" opacity=".8"/>
  <ellipse cx="200" cy="78" rx="60" ry="24" fill="white" opacity=".9"/>
  <ellipse cx="600" cy="70" rx="100" ry="30" fill="white" opacity=".75"/>
  <ellipse cx="660" cy="58" rx="70" ry="22" fill="white" opacity=".85"/>
  <!-- back hills -->
  <path d="M0 280 Q200 140 400 200 Q600 130 800 190 L800 530 L0 530Z" fill="url(#hill1)" opacity=".7"/>
  <!-- mid hills -->
  <path d="M0 350 Q150 260 300 290 Q450 220 600 270 Q700 250 800 280 L800 530 L0 530Z" fill="url(#hill2)"/>
  <!-- trees back -->
  <g fill="#1B4332">
    <ellipse cx="80" cy="300" rx="22" ry="35"/><rect x="75" y="335" width="10" height="20" fill="#8B6914"/>
    <ellipse cx="140" cy="285" rx="18" ry="28"/><rect x="136" y="313" width="8" height="16" fill="#8B6914"/>
    <ellipse cx="680" cy="295" rx="20" ry="32"/><rect x="675" y="327" width="10" height="18" fill="#8B6914"/>
    <ellipse cx="730" cy="280" rx="16" ry="26"/><rect x="726" y="306" width="8" height="14" fill="#8B6914"/>
  </g>
  <!-- ground / lot -->
  <path d="M0 420 Q200 390 400 400 Q600 390 800 410 L800 530 L0 530Z" fill="url(#ground)"/>
  <!-- road -->
  <path d="M280 530 L340 400 L460 400 L520 530Z" fill="#c8b89a" opacity=".6"/>
  <line x1="400" y1="530" x2="400" y2="400" stroke="white" stroke-width="3" stroke-dasharray="20,15" opacity=".5"/>
  <!-- trees front -->
  <g fill="#2D6A4F">
    <ellipse cx="200" cy="390" rx="28" ry="42"/><rect x="194" y="430" width="12" height="24" fill="#8B6914"/>
    <ellipse cx="580" cy="385" rx="26" ry="38"/><rect x="574" y="421" width="12" height="22" fill="#8B6914"/>
    <ellipse cx="640" cy="400" rx="20" ry="30"/><rect x="635" y="428" width="10" height="18" fill="#8B6914"/>
  </g>
  <!-- overlay gradient -->
  <rect width="800" height="530" fill="url(#overlay)"/>
  <!-- badge -->
  <rect x="0" y="0" width="130" height="38" rx="0" fill="#1A3D2B" opacity=".9"/>
  <text x="16" y="25" font-family="Arial" font-size="14" font-weight="700" fill="white">Đất Nền</text>
  <!-- info -->
  <text x="30" y="460" font-family="Arial" font-size="22" font-weight="800" fill="white">Lô B1 – 636 m²</text>
  <text x="30" y="490" font-family="Arial" font-size="14" fill="rgba(255,255,255,0.85)">📍 Khu B · Nam Ban Villas · Lâm Hà</text>
  <text x="30" y="515" font-family="Arial" font-size="13" fill="rgba(255,255,255,0.7)">Sổ đỏ lâu dài · Cam kết lợi suất 9%/năm</text>
</svg>
