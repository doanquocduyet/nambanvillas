<svg xmlns="http://www.w3.org/2000/svg" width="800" height="530" viewBox="0 0 800 530">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#87CEEB"/><stop offset="100%" stop-color="#D4EEFF"/></linearGradient>
    <linearGradient id="lawn" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#52B788"/><stop offset="100%" stop-color="#40916C"/></linearGradient>
    <linearGradient id="wall" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#F5F0E8"/><stop offset="100%" stop-color="#E8E0D0"/></linearGradient>
    <linearGradient id="ov" x1="0" y1="1" x2="0" y2="0"><stop offset="0%" stop-color="rgba(0,0,0,0.6)"/><stop offset="40%" stop-color="rgba(0,0,0,0.05)"/><stop offset="100%" stop-color="rgba(0,0,0,0)"/></linearGradient>
  </defs>
  <rect width="800" height="530" fill="url(#sky)"/>
  <!-- background hills -->
  <path d="M0 280 Q200 200 400 240 Q600 180 800 220 L800 400 L0 400Z" fill="#2D6A4F" opacity=".5"/>
  <!-- lawn -->
  <rect x="0" y="380" width="800" height="150" fill="url(#lawn)"/>
  <!-- villa main building -->
  <rect x="180" y="220" width="440" height="200" fill="url(#wall)"/>
  <!-- roof -->
  <polygon points="150,220 400,110 650,220" fill="#2C2C2C"/>
  <polygon points="580,220 700,180 700,220" fill="#3C3C3C"/>
  <!-- windows -->
  <rect x="220" y="260" width="70" height="55" rx="4" fill="#7BC8E8" opacity=".8"/>
  <rect x="310" y="260" width="70" height="55" rx="4" fill="#7BC8E8" opacity=".8"/>
  <rect x="420" y="260" width="70" height="55" rx="4" fill="#7BC8E8" opacity=".8"/>
  <rect x="510" y="260" width="70" height="55" rx="4" fill="#7BC8E8" opacity=".8"/>
  <!-- door -->
  <rect x="360" y="320" width="80" height="100" rx="4" fill="#8B6914" opacity=".9"/>
  <circle cx="385" cy="372" r="5" fill="#C9A84C"/>
  <!-- path -->
  <path d="M360 530 L370 420 L430 420 L440 530Z" fill="#D4C5A9"/>
  <!-- garden trees -->
  <g>
    <ellipse cx="130" cy="360" rx="36" ry="55" fill="#40916C"/>
    <rect x="124" y="413" width="12" height="30" fill="#8B6914"/>
    <ellipse cx="670" cy="350" rx="32" ry="50" fill="#40916C"/>
    <rect x="664" y="398" width="12" height="28" fill="#8B6914"/>
    <ellipse cx="90" cy="400" rx="24" ry="36" fill="#52B788"/>
    <ellipse cx="710" cy="395" rx="22" ry="34" fill="#52B788"/>
  </g>
  <!-- pool hint -->
  <ellipse cx="580" cy="430" rx="70" ry="25" fill="#7BC8E8" opacity=".7"/>
  <ellipse cx="580" cy="430" rx="65" ry="22" fill="#5BB8D4" opacity=".5"/>
  <rect width="800" height="530" fill="url(#ov)"/>
  <rect x="0" y="0" width="130" height="38" fill="#C9A84C" opacity=".95"/>
  <text x="16" y="25" font-family="Arial" font-size="14" font-weight="700" fill="white">Nhận Ngay</text>
  <text x="30" y="460" font-family="Arial" font-size="22" font-weight="800" fill="white">Biệt thự D2 – 636 m²</text>
  <text x="30" y="490" font-family="Arial" font-size="14" fill="rgba(255,255,255,0.85)">📍 Khu D · Nam Ban Villas</text>
  <text x="30" y="515" font-family="Arial" font-size="13" fill="rgba(255,255,255,0.7)">4 phòng ngủ · Hồ bơi riêng · Nội thất cao cấp</text>
</svg>
