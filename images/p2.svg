  <rect x="370" y="370" width="35" height="40" fill="#7BC8E8" opacity=".5"/>
  <rect x="340" y="350" width="28" height="22" fill="#7BC8E8" opacity=".4"/>
  <rect x="435" y="350" width="28" height="22" fill="#7BC8E8" opacity=".4"/>
