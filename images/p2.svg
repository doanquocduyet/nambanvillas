<svg xmlns="http://www.w3.org/2000/svg" width="800" height="530" viewBox="0 0 800 530">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#FF9B6A"/><stop offset="40%" stop-color="#FFCBA4"/><stop offset="100%" stop-color="#7BC8E8"/></linearGradient>
    <linearGradient id="mtn" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#1B4332"/><stop offset="100%" stop-color="#0D2B1C"/></linearGradient>
    <linearGradient id="mtn2" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#2D6A4F"/><stop offset="100%" stop-color="#1B4332"/></linearGradient>
    <linearGradient id="ov" x1="0" y1="1" x2="0" y2="0"><stop offset="0%" stop-color="rgba(0,0,0,0.7)"/><stop offset="45%" stop-color="rgba(0,0,0,0.15)"/><stop offset="100%" stop-color="rgba(0,0,0,0)"/></linearGradient>
  </defs>
  <rect width="800" height="530" fill="url(#sky)"/>
  <ellipse cx="400" cy="100" rx="60" ry="18" fill="white" opacity=".6"/>
