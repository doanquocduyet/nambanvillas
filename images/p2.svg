  <g fill="#1B4332"><ellipse cx="290" cy="395" rx="22" ry="36"/><rect x="284" y="429" width="12" height="22" fill="#5C3D0F"/>
  <ellipse cx="520" cy="390" rx="24" ry="38"/><rect x="514" y="426" width="12" height="22" fill="#5C3D0F"/>
  <ellipse cx="240" cy="420" rx="18" ry="28"/><ellipse cx="560" cy="415" rx="18" ry="28"/></g>
  <rect width="800" height="530" fill="url(#ov)"/>
