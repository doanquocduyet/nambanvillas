<svg xmlns="http://www.w3.org/2000/svg" width="400" height="260" viewBox="0 0 400 260">
  <defs>
    <linearGradient id="sky12" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#E3F2FD"/><stop offset="100%" stop-color="#BBDEFB"/></linearGradient>
    <linearGradient id="road12" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#C8B89A"/><stop offset="50%" stop-color="#D4C5A0"/><stop offset="100%" stop-color="#C8B89A"/></linearGradient>
  </defs>
  <rect width="400" height="260" fill="url(#sky12)"/>
  <!-- Hills -->
  <ellipse cx="100" cy="280" rx="180" ry="130" fill="#3A7D44"/>
  <ellipse cx="320" cy="280" rx="160" ry="120" fill="#4A8C5C"/>
  <!-- Road perspective -->
  <polygon points="170,260 230,260 260,150 140,150" fill="url(#road12)"/>
  <line x1="200" y1="150" x2="200" y2="260" stroke="white" stroke-width="2" stroke-dasharray="10,8"/>
  <!-- Trees roadside -->
  <polygon points="125,200 140,155 155,200" fill="#1A4D2B"/>
  <rect x="136" y="200" width="8" height="20" fill="#5C3317"/>
  <polygon points="245,200 260,155 275,200" fill="#1A4D2B"/>
  <rect x="256" y="200" width="8" height="20" fill="#5C3317"/>
  <!-- Street sign -->
  <rect x="270" y="150" width="115" height="44" rx="6" fill="#C9A84C"/>
  <text x="327" y="168" text-anchor="middle" font-family="sans-serif" font-size="11" fill="white" font-weight="700">Đường Chùa Linh Ẩn</text>
  <text x="327" y="185" text-anchor="middle" font-family="sans-serif" font-size="11" fill="white">Mặt tiền · 3 tỷ</text>
  <!-- Label bottom -->
  <rect x="100" y="115" width="160" height="30" rx="6" fill="#1A3D2B" opacity="0.9"/>
  <text x="180" y="134" text-anchor="middle" font-family="sans-serif" font-size="12" fill="white" font-weight="700">1.000m² · Mặt đường 20m</text>
</svg>
