<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 40" fill="none">
  <defs>
    <!-- Petal/flame outer frame clipping -->
    <clipPath id="c">
      <path d="M16,3 C16,3 28,12 29,20.5 C30,28 25,34.5 16,34.5 C7,34.5 2,28 3,20.5 C4,12 16,3 16,3Z"/>
    </clipPath>
    <linearGradient id="g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C2D8B8"/>
      <stop offset="100%" stop-color="#8FB88A"/>
    </linearGradient>
  </defs>

  <!-- Outer gold glow ring -->
  <path d="M16,2 C16,2 29.5,11 30.5,20 C31.5,28.5 26,36 16,36 C6,36 0.5,28.5 1.5,20 C2.5,11 16,2 16,2Z" fill="#C9A84C" opacity="0.18"/>

  <!-- Background fill -->
  <path d="M16,3 C16,3 28,12 29,20.5 C30,28 25,34.5 16,34.5 C7,34.5 2,28 3,20.5 C4,12 16,3 16,3Z" fill="url(#g)"/>

  <!-- Scene clipped inside teardrop -->
  <g clip-path="url(#c)">
    <!-- Sky -->
    <rect x="2" y="3" width="28" height="32" fill="#C8DCC0"/>
    <!-- Back mountain range -->
    <polygon points="2,22 7,14 11,18 16,12 21,16 25,14 30,20 30,24 2,24" fill="#7A9E7A" opacity="0.55"/>
    <!-- Front mountain -->
    <polygon points="2,27 7,19 12,23 16,17 20,21 25,18 30,24 30,29 2,29" fill="#4A7550" opacity="0.9"/>
    <!-- Pine trees -->
    <polygon points="4.5,29 6.5,22 8.5,29" fill="#1E4A1E"/>
    <polygon points="9,29 11,23 13,29" fill="#1E4A1E"/>
    <polygon points="21,29 23,23 25,29" fill="#1E4A1E"/>
    <polygon points="25.5,29 27.5,23 29.5,29" fill="#1E4A1E"/>
    <!-- Villa -->
    <rect x="13" y="25" width="6" height="5" fill="#D8CC98"/>
    <polygon points="12,26 16,22 20,26" fill="#7A4820"/>
    <!-- Door/light -->
    <rect x="15" y="27" width="2" height="3" fill="#C9A84C" opacity="0.95"/>
    <!-- Windows -->
    <rect x="13.5" y="25.5" width="1.5" height="1.5" fill="#FFF0A0" opacity="0.8"/>
    <rect x="17" y="25.5" width="1.5" height="1.5" fill="#FFF0A0" opacity="0.8"/>
    <!-- Water -->
    <ellipse cx="16" cy="33" rx="8" ry="1.8" fill="#90B8C8" opacity="0.5"/>
  </g>

  <!-- Gold border -->
  <path d="M16,3 C16,3 28,12 29,20.5 C30,28 25,34.5 16,34.5 C7,34.5 2,28 3,20.5 C4,12 16,3 16,3Z" fill="none" stroke="#C9A84C" stroke-width="1.1"/>
  <!-- Inner petal lines -->
  <path d="M16,3 C13,8 7.5,14 6.5,21" fill="none" stroke="#C9A84C" stroke-width="0.6" opacity="0.7"/>
  <path d="M16,3 C19,8 24.5,14 25.5,21" fill="none" stroke="#C9A84C" stroke-width="0.6" opacity="0.7"/>
  <path d="M16,3 C13.5,7 9,13 8.5,19" fill="none" stroke="#C9A84C" stroke-width="0.4" opacity="0.45"/>
  <path d="M16,3 C18.5,7 23,13 23.5,19" fill="none" stroke="#C9A84C" stroke-width="0.4" opacity="0.45"/>

  <!-- Leaf tip at top -->
  <path d="M16,0.5 C14.5,1.5 14,2.8 16,3 C18,2.8 17.5,1.5 16,0.5Z" fill="#2D6B2D"/>
  <line x1="16" y1="0.5" x2="16" y2="3" stroke="#1A4A1A" stroke-width="0.4"/>
</svg>
