<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none">
  <!-- Left pillar (taller) -->
  <line x1="10" y1="38" x2="10" y2="13" stroke="#1A3D2B" stroke-width="2.5" stroke-linecap="square"/>
  <!-- Right pillar (shorter) -->
  <line x1="32" y1="37" x2="32" y2="19" stroke="#1A3D2B" stroke-width="2.5" stroke-linecap="square"/>
  <!-- M crown: asymmetric peak -->
  <polyline points="10,13 21,7 32,19" stroke="#1A3D2B" stroke-width="2.5" stroke-linecap="square" stroke-linejoin="miter" fill="none"/>
  <!-- Wave 1 -->
  <path d="M3,24 C7,21 11,27 16,24 C21,21 27,27 32,24 C35,22 38,24 40,23" stroke="#1A3D2B" stroke-width="2" stroke-linecap="round" fill="none"/>
  <!-- Wave 2 -->
  <path d="M2,32 C6,29 10,35 16,31 C22,27 28,34 32,31 C35,29 37,32 40,30" stroke="#1A3D2B" stroke-width="2" stroke-linecap="round" fill="none"/>
</svg>
