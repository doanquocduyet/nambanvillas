<svg viewBox="0 0 820 300" xmlns="http://www.w3.org/2000/svg">
  <defs><linearGradient id="morn" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#87CEEB"/><stop offset="60%" stop-color="#B8E4F9"/><stop offset="100%" stop-color="#2E5C40"/></linearGradient></defs>
  <rect width="820" height="300" fill="url(#morn)"/>
  <!-- Sun -->
  <circle cx="650" cy="80" r="45" fill="#FFD700" opacity=".85"/>
  <!-- Fog/mist layer -->
  <ellipse cx="410" cy="220" rx="450" ry="30" fill="rgba(255,255,255,.4)"/>
  <ellipse cx="200" cy="200" rx="250" ry="20" fill="rgba(255,255,255,.3)"/>
  <!-- Hills -->
  <ellipse cx="150" cy="280" rx="200" ry="80" fill="#1A3D2B"/>
  <ellipse cx="600" cy="290" rx="250" ry="80" fill="#2E5C40"/>
  <ellipse cx="410" cy="270" rx="300" ry="60" fill="#1A5C3A"/>
  <!-- Text -->
  <rect x="160" y="80" width="300" height="80" rx="10" fill="rgba(255,255,255,.85)"/>
  <text x="310" y="112" text-anchor="middle" font-family="serif" font-size="17" fill="#1A3D2B" font-weight="700">Khí Hậu Nam Ban</text>
  <text x="310" y="134" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#2E5C40">Mát mẻ quanh năm · 18–22°C</text>
  <text x="310" y="152" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#C9A84C">Cuộc sống lý tưởng cao nguyên</text>
</svg>
