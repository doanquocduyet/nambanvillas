<svg viewBox="0 0 820 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1A3D2B"/>
      <stop offset="100%" stop-color="#2E5C40"/>
    </linearGradient>
  </defs>
  <rect width="820" height="300" fill="url(#bg3)"/>
  <!-- timeline visual -->
  <!-- vertical line -->
  <line x1="410" y1="30" x2="410" y2="270" stroke="#C9A84C" stroke-width="2" opacity=".4"/>
  <!-- 2024 marker -->
  <circle cx="410" cy="70" r="10" fill="#C9A84C"/>
  <text x="425" y="74" font-family="sans-serif" font-size="10" fill="#C9A84C" font-weight="700">2024</text>
  <text x="200" y="68" text-anchor="end" font-family="sans-serif" font-size="9" fill="white" opacity=".7">Thị trấn Nam Ban</text>
  <text x="200" y="80" text-anchor="end" font-family="sans-serif" font-size="9" fill="white" opacity=".7">đô thị loại V</text>
  <!-- 2025 marker -->
  <circle cx="410" cy="120" r="10" fill="#E8A020"/>
  <text x="425" y="124" font-family="sans-serif" font-size="10" fill="#E8A020" font-weight="700">2025</text>
  <text x="200" y="118" text-anchor="end" font-family="sans-serif" font-size="9" fill="white" opacity=".7">Sáp nhập hành chính</text>
  <text x="200" y="130" text-anchor="end" font-family="sans-serif" font-size="9" fill="white" opacity=".7">xã → thị trấn Nam Ban</text>
  <!-- 2026 marker -->
  <circle cx="410" cy="175" r="12" fill="#FFD700"/>
  <text x="428" y="179" font-family="sans-serif" font-size="10" fill="#FFD700" font-weight="700">2026 ★</text>
  <text x="200" y="168" text-anchor="end" font-family="sans-serif" font-size="9" fill="#FFD700">QH đô thị loại III</text>
  <text x="200" y="181" text-anchor="end" font-family="sans-serif" font-size="9" fill="#FFD700">Cao tốc Đông–Tây</text>
  <text x="200" y="194" text-anchor="end" font-family="sans-serif" font-size="9" fill="#FFD700">Hạ tầng chiến lược</text>
  <!-- 2030 marker -->
  <circle cx="410" cy="240" r="10" fill="#7DC8A0"/>
  <text x="425" y="244" font-family="sans-serif" font-size="10" fill="#7DC8A0" font-weight="700">2030</text>
  <text x="200" y="238" text-anchor="end" font-family="sans-serif" font-size="9" fill="white" opacity=".7">Trung tâm nghỉ dưỡng</text>
  <text x="200" y="250" text-anchor="end" font-family="sans-serif" font-size="9" fill="white" opacity=".7">sinh thái vùng cao nguyên</text>
  <!-- Right title -->
  <text x="620" y="80" text-anchor="middle" font-family="serif" font-size="20" fill="white" font-weight="700">Nam Ban</text>
  <text x="620" y="108" text-anchor="middle" font-family="serif" font-size="16" fill="#C9A84C">Những Thay Đổi</text>
  <text x="620" y="132" text-anchor="middle" font-family="serif" font-size="16" fill="#C9A84C">Sẽ Đến</text>
  <text x="620" y="160" text-anchor="middle" font-family="sans-serif" font-size="10" fill="rgba(255,255,255,.7)">2026 – 2030</text>
  <!-- icon elements -->
  <g transform="translate(560,185)">
    <rect x="0" y="0" width="120" height="80" rx="8" fill="rgba(201,168,76,.12)" stroke="#C9A84C" stroke-width="1"/>
    <text x="60" y="22" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#C9A84C">Đô thị loại III</text>
    <text x="60" y="38" text-anchor="middle" font-family="serif" font-size="18" fill="white" font-weight="700">↑ III</text>
    <text x="60" y="60" text-anchor="middle" font-family="sans-serif" font-size="7" fill="white" opacity=".7">Nâng cấp từ loại V</text>
    <text x="60" y="72" text-anchor="middle" font-family="sans-serif" font-size="7" fill="white" opacity=".7">theo QĐ 2786/2026</text>
  </g>
</svg>
