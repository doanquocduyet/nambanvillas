<svg viewBox="0 0 820 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="820" height="300" fill="#1A3D2B"/>
  <rect x="0" y="160" width="820" height="140" fill="#0D2B1C"/>
  <!-- Road -->
  <rect x="300" y="0" width="220" height="300" fill="rgba(100,100,100,.3)"/>
  <line x1="410" y1="0" x2="410" y2="300" stroke="white" stroke-width="3" stroke-dasharray="20,15" opacity=".5"/>
  <!-- Hills -->
  <ellipse cx="150" cy="200" rx="180" ry="80" fill="#2E5C40"/>
  <ellipse cx="680" cy="210" rx="160" ry="70" fill="#2E5C40"/>
  <!-- Trees -->
  <polygon points="80,180 110,120 140,180" fill="#3A7D44"/>
  <polygon points="700,175 725,120 750,175" fill="#3A7D44"/>
  <!-- Text overlay -->
  <rect x="0" y="200" width="820" height="100" fill="rgba(0,0,0,.5)"/>
  <text x="410" y="240" text-anchor="middle" font-family="serif" font-size="20" fill="white" font-weight="700">Tuyến Tránh Nam Ban</text>
  <text x="410" y="265" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#C9A84C">Khi nào hoàn thành?</text>
</svg>
