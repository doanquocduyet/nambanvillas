<svg viewBox="0 0 820 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0D2E1C"/>
      <stop offset="100%" stop-color="#1A5C38"/>
    </linearGradient>
    <linearGradient id="gld" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F0C060"/>
      <stop offset="100%" stop-color="#C9A84C"/>
    </linearGradient>
  </defs>
  <rect width="820" height="300" fill="url(#bg1)"/>
  <!-- decorative grid -->
  <line x1="0" y1="60" x2="820" y2="60" stroke="white" stroke-width=".3" opacity=".1"/>
  <line x1="0" y1="120" x2="820" y2="120" stroke="white" stroke-width=".3" opacity=".1"/>
  <line x1="0" y1="180" x2="820" y2="180" stroke="white" stroke-width=".3" opacity=".1"/>
  <line x1="0" y1="240" x2="820" y2="240" stroke="white" stroke-width=".3" opacity=".1"/>
  <!-- Left illustration: map outline (Lam Dong shape simplified) -->
  <g transform="translate(50,40)" opacity=".8">
    <path d="M80 20 L140 10 L200 30 L230 80 L220 140 L180 200 L120 220 L60 200 L20 150 L30 80 Z" fill="none" stroke="#C9A84C" stroke-width="1.5"/>
    <!-- dots for cities -->
    <circle cx="100" cy="90" r="5" fill="#C9A84C"/>
    <text x="108" y="94" font-family="sans-serif" font-size="8" fill="#C9A84C">Đà Lạt</text>
    <circle cx="150" cy="160" r="4" fill="#7DC8A0"/>
    <text x="158" y="164" font-family="sans-serif" font-size="8" fill="#7DC8A0">Bảo Lộc</text>
    <circle cx="80" cy="130" r="4" fill="#FFD700"/>
    <text x="42" y="134" font-family="sans-serif" font-size="8" fill="#FFD700">Nam Ban</text>
    <!-- road line -->
    <path d="M100 90 L80 130 L150 160" stroke="white" stroke-width="1" stroke-dasharray="4,3" fill="none" opacity=".6"/>
  </g>
  <!-- Right: text content -->
  <text x="320" y="70" font-family="serif" font-size="11" fill="#C9A84C" letter-spacing="2">QĐ 2786/QĐ-UBND · 06/06/2026</text>
  <text x="320" y="105" font-family="serif" font-size="26" fill="white" font-weight="700">Điều Chỉnh Quy Hoạch</text>
  <text x="320" y="135" font-family="serif" font-size="26" fill="white" font-weight="700">Tỉnh Lâm Đồng 2026</text>
  <text x="320" y="168" font-family="sans-serif" font-size="13" fill="#A8D4B8">Thời kỳ 2021–2030, tầm nhìn đến 2050</text>
  <!-- stats row -->
  <rect x="318" y="190" width="120" height="64" rx="8" fill="rgba(201,168,76,.15)" stroke="#C9A84C" stroke-width="1"/>
  <text x="378" y="215" text-anchor="middle" font-family="serif" font-size="20" fill="#F0C060" font-weight="700">10,5%</text>
  <text x="378" y="232" text-anchor="middle" font-family="sans-serif" font-size="8" fill="white" opacity=".8">GRDP/năm</text>
  <text x="378" y="246" text-anchor="middle" font-family="sans-serif" font-size="8" fill="white" opacity=".8">2026–2030</text>
  <rect x="452" y="190" width="120" height="64" rx="8" fill="rgba(201,168,76,.15)" stroke="#C9A84C" stroke-width="1"/>
  <text x="512" y="215" text-anchor="middle" font-family="serif" font-size="20" fill="#F0C060" font-weight="700">8.000 USD</text>
  <text x="512" y="232" text-anchor="middle" font-family="sans-serif" font-size="8" fill="white" opacity=".8">GRDP đầu người</text>
  <text x="512" y="246" text-anchor="middle" font-family="sans-serif" font-size="8" fill="white" opacity=".8">đến 2030</text>
  <rect x="586" y="190" width="120" height="64" rx="8" fill="rgba(201,168,76,.15)" stroke="#C9A84C" stroke-width="1"/>
  <text x="646" y="215" text-anchor="middle" font-family="serif" font-size="20" fill="#F0C060" font-weight="700">24.239</text>
  <text x="646" y="232" text-anchor="middle" font-family="sans-serif" font-size="8" fill="white" opacity=".8">km² diện tích</text>
  <text x="646" y="246" text-anchor="middle" font-family="sans-serif" font-size="8" fill="white" opacity=".8">124 đơn vị hành chính</text>
</svg>
