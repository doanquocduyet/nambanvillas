  <circle cx="130" cy="215" r="10" fill="#C9A84C"/>
  <text x="145" y="219" font-family="sans-serif" font-size="10" fill="white">✓</text>
  <text x="155" y="219" font-family="sans-serif" font-size="11" fill="white">Làm việc với môi giới uy tín địa phương</text>

  <text x="410" y="282" text-anchor="middle" font-family="sans-serif" font-size="9" fill="rgba(255,255,255,.5)">Nam Ban Villas · Tư vấn miễn phí</text>
</svg>
