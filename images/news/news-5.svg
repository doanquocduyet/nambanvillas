<svg viewBox="0 0 820 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="820" height="300" fill="#1A3D2B"/>
  <!-- Checklist style -->
  <rect x="80" y="40" width="660" height="220" rx="12" fill="rgba(255,255,255,.05)" stroke="rgba(201,168,76,.3)" stroke-width="1"/>
  <text x="410" y="78" text-anchor="middle" font-family="serif" font-size="18" fill="white" font-weight="700">Kinh Nghiệm Mua Đất Nam Ban</text>
  <!-- Check items -->
  <circle cx="130" cy="110" r="10" fill="#C9A84C"/>
  <text x="145" y="114" font-family="sans-serif" font-size="10" fill="white">✓</text>
  <text x="155" y="114" font-family="sans-serif" font-size="11" fill="white">Kiểm tra pháp lý – sổ đỏ, quy hoạch</text>

  <circle cx="130" cy="145" r="10" fill="#C9A84C"/>
  <text x="145" y="149" font-family="sans-serif" font-size="10" fill="white">✓</text>
  <text x="155" y="149" font-family="sans-serif" font-size="11" fill="white">Xem thực địa, khảo sát hạ tầng</text>

  <circle cx="130" cy="180" r="10" fill="#C9A84C"/>
  <text x="145" y="184" font-family="sans-serif" font-size="10" fill="white">✓</text>
