<svg viewBox="0 0 820 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0D2E1C"/>
      <stop offset="50%" stop-color="#1A5C38"/>
      <stop offset="100%" stop-color="#2E8050"/>
    </linearGradient>
  </defs>
  <rect width="820" height="300" fill="url(#bg4)"/>
  <!-- aerial view of Nam Ban - stylized -->
  <!-- coffee fields -->
  <ellipse cx="140" cy="200" rx="100" ry="60" fill="#1E5C2A" opacity=".8"/>
  <ellipse cx="280" cy="230" rx="80" ry="45" fill="#2A6E34" opacity=".7"/>
  <!-- mountain backdrop -->
  <path d="M0 180 L80 120 L160 155 L250 95 L340 135 L420 80 L820 140 L820 300 L0 300Z" fill="#0D2214" opacity=".6"/>
  <!-- road -->
  <path d="M0 230 Q200 220 410 225 Q600 230 820 215" stroke="#C9A84C" stroke-width="3" fill="none" opacity=".6"/>
  <text x="200" y="215" font-family="sans-serif" font-size="8" fill="#C9A84C" opacity=".8">QL 27 → Đà Lạt 25km</text>
  <!-- Nam Ban label -->
  <circle cx="410" cy="225" r="8" fill="#FFD700"/>
  <text x="410" y="195" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#FFD700" font-weight="700">Nam Ban</text>
  <!-- property icons cluster -->
  <g transform="translate(380, 195)">
    <!-- house icon -->
    <polygon points="30,0 0,20 60,20" fill="#C9A84C" opacity=".9"/>
    <rect x="10" y="20" width="40" height="25" fill="#F5EDD8"/>
    <rect x="22" y="28" width="16" height="17" fill="#7DC8A0"/>
  </g>
  <!-- Right panel: analysis -->
  <rect x="490" y="20" width="310" height="260" rx="12" fill="rgba(13,34,20,.7)"/>
  <text x="645" y="55" text-anchor="middle" font-family="serif" font-size="16" fill="white" font-weight="700">Tiềm Năng Đầu Tư</text>
  <text x="645" y="75" text-anchor="middle" font-family="serif" font-size="14" fill="#C9A84C">Nam Ban 2026</text>
  <!-- indicators -->
  <g font-family="sans-serif" font-size="9" fill="white">
    <text x="510" y="105">📍 Cách Đà Lạt 25 phút</text>
    <text x="510" y="125">🏗 Đô thị loại III theo QH 2026</text>
    <text x="510" y="145">🛣 Cao tốc Đông–Tây kết nối</text>
    <text x="510" y="165">🌿 Vùng cao nguyên nghỉ dưỡng</text>
    <text x="510" y="185">☕ Nông nghiệp CNC cà phê</text>
    <text x="510" y="205">💹 Đất tăng 40-60% (2025)</text>
  </g>
  <line x1="510" y1="218" x2="780" y2="218" stroke="#C9A84C" stroke-width=".5" opacity=".5"/>
  <!-- price comparison bar -->
  <text x="510" y="235" font-family="sans-serif" font-size="8" fill="#C9A84C">Giá đất so với Đà Lạt nội đô</text>
  <rect x="510" y="242" width="15" height="12" rx="2" fill="#C9A84C"/>
  <text x="530" y="252" font-family="sans-serif" font-size="7" fill="white">Nam Ban: 1-4 tr/m²</text>
  <rect x="510" y="257" width="200" height="12" rx="2" fill="#C9A84C" opacity=".3"/>
  <rect x="510" y="257" width="15" height="12" rx="2" fill="white" opacity=".3"/>
  <text x="530" y="267" font-family="sans-serif" font-size="7" fill="white" opacity=".7">Đà Lạt: 50-150 tr/m² (15-50x)</text>
</svg>
