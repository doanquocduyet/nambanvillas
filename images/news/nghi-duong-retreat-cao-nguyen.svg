<svg viewBox="0 0 820 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A3D2B"/>
      <stop offset="60%" stop-color="#2E6B4A"/>
      <stop offset="100%" stop-color="#3D8C5E"/>
    </linearGradient>
    <linearGradient id="sun" cx="50%" cy="50%" r="50%" fx="50%" fy="50%" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#FFEEBB"/>
      <stop offset="100%" stop-color="#F0A020"/>
    </linearGradient>
  </defs>
  <rect width="820" height="300" fill="url(#sky)"/>
  <!-- sun/moon glow -->
  <circle cx="650" cy="60" r="40" fill="#F0C060" opacity=".12"/>
  <circle cx="650" cy="60" r="25" fill="#F0C060" opacity=".2"/>
  <circle cx="650" cy="60" r="15" fill="#FFEEBB" opacity=".5"/>
  <!-- mountain range -->
  <path d="M0 200 L80 120 L160 180 L240 100 L340 170 L420 90 L500 160 L580 110 L660 170 L740 100 L820 140 L820 300 L0 300Z" fill="#1A3D2B"/>
  <path d="M0 230 L60 180 L130 210 L220 160 L300 200 L380 150 L460 195 L540 155 L640 200 L720 160 L820 180 L820 300 L0 300Z" fill="#0D2214"/>
  <!-- trees -->
  <g fill="#2A5C38">
    <polygon points="90,200 100,170 110,200"/>
    <polygon points="105,205 118,168 131,205"/>
    <polygon points="130,202 142,172 154,202"/>
  </g>
  <g fill="#1E4A2A">
    <polygon points="550,200 562,168 574,200"/>
    <polygon points="565,204 578,170 591,204"/>
    <polygon points="585,201 597,172 609,201"/>
  </g>
  <!-- villa/retreat building -->
  <g transform="translate(340, 145)">
    <rect x="0" y="30" width="100" height="65" fill="#F5EDD8" rx="2"/>
    <polygon points="-8,30 50,5 108,30" fill="#C9A84C"/>
    <rect x="15" y="50" width="20" height="25" fill="#A8C4B0" rx="1"/>
    <rect x="65" y="50" width="20" height="25" fill="#A8C4B0" rx="1"/>
    <rect x="38" y="55" width="24" height="40" fill="#6B9E80" rx="1"/>
    <!-- chimney -->
    <rect x="65" y="0" width="8" height="20" fill="#B8966A"/>
    <ellipse cx="69" cy="0" rx="6" ry="3" fill="#8B6844"/>
  </g>
  <!-- mist/fog effect -->
  <ellipse cx="250" cy="220" rx="150" ry="25" fill="white" opacity=".06"/>
  <ellipse cx="600" cy="215" rx="180" ry="20" fill="white" opacity=".05"/>
  <!-- text overlay -->
  <rect x="0" y="0" width="300" height="300" fill="rgba(13,34,20,.5)"/>
  <text x="30" y="80" font-family="serif" font-size="22" fill="white" font-weight="700">Nghỉ Dưỡng &amp;</text>
  <text x="30" y="112" font-family="serif" font-size="22" fill="white" font-weight="700">Retreat Cao Nguyên</text>
  <text x="30" y="148" font-family="sans-serif" font-size="12" fill="#C9A84C">Lâm Đồng · 2026–2030</text>
  <line x1="30" y1="162" x2="230" y2="162" stroke="#C9A84C" stroke-width="1"/>
  <text x="30" y="185" font-family="sans-serif" font-size="10" fill="rgba(255,255,255,.8)">Xu hướng du lịch sinh thái</text>
  <text x="30" y="202" font-family="sans-serif" font-size="10" fill="rgba(255,255,255,.8)">chăm sóc sức khỏe &amp; tâm linh</text>
  <text x="30" y="219" font-family="sans-serif" font-size="10" fill="rgba(255,255,255,.8)">trên cao nguyên đang bùng nổ</text>
</svg>
