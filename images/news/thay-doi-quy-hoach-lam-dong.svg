<svg viewBox="0 0 820 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1A3D2B"/>
      <stop offset="100%" stop-color="#0D2B1C"/>
    </linearGradient>
  </defs>
  <rect width="820" height="300" fill="url(#bg2)"/>
  <!-- 5 change boxes -->
  <g transform="translate(40,40)">
    <rect width="140" height="80" rx="10" fill="rgba(201,168,76,.15)" stroke="#C9A84C" stroke-width="1"/>
    <text x="70" y="28" text-anchor="middle" font-family="sans-serif" font-size="22" fill="#C9A84C" font-weight="800">01</text>
    <text x="70" y="48" text-anchor="middle" font-family="sans-serif" font-size="9" fill="white">Đô thị loại III</text>
    <text x="70" y="62" text-anchor="middle" font-family="sans-serif" font-size="8" fill="rgba(255,255,255,.6)">Nam Ban nâng cấp</text>
  </g>
  <g transform="translate(200,40)">
    <rect width="140" height="80" rx="10" fill="rgba(201,168,76,.15)" stroke="#C9A84C" stroke-width="1"/>
    <text x="70" y="28" text-anchor="middle" font-family="sans-serif" font-size="22" fill="#C9A84C" font-weight="800">02</text>
    <text x="70" y="48" text-anchor="middle" font-family="sans-serif" font-size="9" fill="white">Cao tốc Đông–Tây</text>
    <text x="70" y="62" text-anchor="middle" font-family="sans-serif" font-size="8" fill="rgba(255,255,255,.6)">Phan Thiết–Bảo Lộc</text>
  </g>
  <g transform="translate(360,40)">
    <rect width="140" height="80" rx="10" fill="rgba(201,168,76,.15)" stroke="#C9A84C" stroke-width="1"/>
    <text x="70" y="28" text-anchor="middle" font-family="sans-serif" font-size="22" fill="#C9A84C" font-weight="800">03</text>
    <text x="70" y="48" text-anchor="middle" font-family="sans-serif" font-size="9" fill="white">GRDP 10,5%/năm</text>
    <text x="70" y="62" text-anchor="middle" font-family="sans-serif" font-size="8" fill="rgba(255,255,255,.6)">2026–2030</text>
  </g>
  <g transform="translate(520,40)">
    <rect width="140" height="80" rx="10" fill="rgba(201,168,76,.15)" stroke="#C9A84C" stroke-width="1"/>
    <text x="70" y="28" text-anchor="middle" font-family="sans-serif" font-size="22" fill="#C9A84C" font-weight="800">04</text>
    <text x="70" y="48" text-anchor="middle" font-family="sans-serif" font-size="9" fill="white">Du lịch mũi nhọn</text>
    <text x="70" y="62" text-anchor="middle" font-family="sans-serif" font-size="8" fill="rgba(255,255,255,.6)">Đà Lạt trung tâm MICE</text>
  </g>
  <g transform="translate(680,40)">
    <rect width="100" height="80" rx="10" fill="rgba(201,168,76,.15)" stroke="#C9A84C" stroke-width="1"/>
    <text x="50" y="28" text-anchor="middle" font-family="sans-serif" font-size="22" fill="#C9A84C" font-weight="800">05</text>
    <text x="50" y="48" text-anchor="middle" font-family="sans-serif" font-size="9" fill="white">Sáp nhập</text>
    <text x="50" y="62" text-anchor="middle" font-family="sans-serif" font-size="8" fill="rgba(255,255,255,.6)">Hành chính mới</text>
  </g>
  <!-- Bottom title -->
  <text x="410" y="175" text-anchor="middle" font-family="serif" font-size="22" fill="white" font-weight="700">5 Thay Đổi Quan Trọng</text>
  <text x="410" y="200" text-anchor="middle" font-family="serif" font-size="16" fill="#C9A84C">Quy hoạch Lâm Đồng 2025</text>
  <text x="410" y="224" text-anchor="middle" font-family="sans-serif" font-size="10" fill="rgba(255,255,255,.5)">Ảnh hưởng trực tiếp đến Nam Ban · Phân tích bởi Nam Ban Villas</text>
  <!-- Road line -->
  <line x1="40" y1="260" x2="780" y2="260" stroke="#C9A84C" stroke-width="2" stroke-dasharray="12,6" opacity=".4"/>
  <circle cx="410" cy="260" r="5" fill="#C9A84C" opacity=".6"/>
</svg>
