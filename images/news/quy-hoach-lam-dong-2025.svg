<svg viewBox="0 0 820 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0D2B1C"/>
      <stop offset="100%" stop-color="#1A5C3A"/>
    </linearGradient>
  </defs>
  <rect width="820" height="300" fill="url(#bg)"/>
  <!-- Grid lines -->
  <line x1="0" y1="100" x2="820" y2="100" stroke="rgba(201,168,76,.15)" stroke-width="1"/>
  <line x1="0" y1="200" x2="820" y2="200" stroke="rgba(201,168,76,.15)" stroke-width="1"/>
  <line x1="200" y1="0" x2="200" y2="300" stroke="rgba(201,168,76,.1)" stroke-width="1"/>
  <line x1="500" y1="0" x2="500" y2="300" stroke="rgba(201,168,76,.1)" stroke-width="1"/>
  <!-- Map outline (simplified Lâm Đồng region) -->
  <polygon points="80,60 160,40 260,70 300,140 260,200 180,230 100,200 60,140" fill="rgba(42,90,60,.6)" stroke="#C9A84C" stroke-width="1.5"/>
  <!-- Nam Ban dot -->
  <circle cx="148" cy="130" r="8" fill="#FFD700"/>
  <circle cx="148" cy="130" r="14" fill="none" stroke="#FFD700" stroke-width="1.5" opacity=".5"/>
  <text x="165" y="134" font-family="sans-serif" font-size="9" fill="#FFD700" font-weight="700">Nam Ban</text>
  <!-- Đà Lạt dot -->
  <circle cx="200" cy="100" r="6" fill="white" opacity=".7"/>
  <text x="210" y="104" font-family="sans-serif" font-size="8" fill="white" opacity=".7">Đà Lạt</text>
  <!-- Right panel -->
  <rect x="360" y="30" width="420" height="240" rx="12" fill="rgba(255,255,255,.05)" stroke="rgba(201,168,76,.3)" stroke-width="1"/>
  <text x="570" y="68" text-anchor="middle" font-family="serif" font-size="18" fill="white" font-weight="700">Quy hoạch tỉnh Lâm Đồng</text>
  <text x="570" y="92" text-anchor="middle" font-family="serif" font-size="14" fill="#C9A84C">Điều chỉnh 2021–2030</text>
  <text x="570" y="112" text-anchor="middle" font-family="sans-serif" font-size="10" fill="rgba(255,255,255,.6)">Tầm nhìn đến năm 2050 · QĐ 2786/2026</text>
  <!-- Stat boxes -->
  <rect x="380" y="130" width="120" height="70" rx="8" fill="rgba(201,168,76,.12)" stroke="rgba(201,168,76,.4)" stroke-width="1"/>
  <text x="440" y="158" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#C9A84C">Diện tích</text>
  <text x="440" y="178" text-anchor="middle" font-family="serif" font-size="16" fill="white" font-weight="700">24.239</text>
  <text x="440" y="193" text-anchor="middle" font-family="sans-serif" font-size="8" fill="rgba(255,255,255,.6)">km²</text>

  <rect x="520" y="130" width="120" height="70" rx="8" fill="rgba(201,168,76,.12)" stroke="rgba(201,168,76,.4)" stroke-width="1"/>
  <text x="580" y="158" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#C9A84C">GRDP/năm</text>
  <text x="580" y="178" text-anchor="middle" font-family="serif" font-size="16" fill="white" font-weight="700">10,5%</text>
  <text x="580" y="193" text-anchor="middle" font-family="sans-serif" font-size="8" fill="rgba(255,255,255,.6)">tăng trưởng</text>

  <rect x="660" y="130" width="100" height="70" rx="8" fill="rgba(201,168,76,.12)" stroke="rgba(201,168,76,.4)" stroke-width="1"/>
  <text x="710" y="158" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#C9A84C">124 xã</text>
  <text x="710" y="178" text-anchor="middle" font-family="serif" font-size="16" fill="white" font-weight="700">3</text>
  <text x="710" y="193" text-anchor="middle" font-family="sans-serif" font-size="8" fill="rgba(255,255,255,.6)">tỉnh hợp nhất</text>

  <text x="570" y="235" text-anchor="middle" font-family="sans-serif" font-size="9" fill="rgba(255,255,255,.5)">Hạ tầng chiến lược · Đô thị loại III · Cao tốc Đông–Tây</text>
</svg>
