<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 44 48" fill="none">
  <!-- Abstract rolling hills — pure line art, dark green -->
  <!-- Back hill: gentle arc -->
  <path d="M4,32 Q14,14 22,16 Q30,18 40,32" stroke="#1A3D2B" stroke-width="1.6" stroke-linecap="round" fill="none"/>
  <!-- Front hill: broader arc -->
  <path d="M0,40 Q10,24 22,26 Q34,28 44,40" stroke="#1A3D2B" stroke-width="2" stroke-linecap="round" fill="none"/>
  <!-- Gold accent dot — like a sun or landmark on the peak -->
  <circle cx="22" cy="16" r="2.2" fill="#C9A84C"/>
</svg>
