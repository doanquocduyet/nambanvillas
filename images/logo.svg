<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240" fill="none">
  <defs>
    <!-- Mountain scene gradient -->
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C8D8C0"/>
      <stop offset="60%" stop-color="#D8E8C8"/>
      <stop offset="100%" stop-color="#B8C8A0"/>
    </linearGradient>
    <linearGradient id="mtGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6B8F6B" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#3D5C3D" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="waterGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A0B8C0"/>
      <stop offset="100%" stop-color="#7090A0"/>
    </linearGradient>
    <!-- Clip path for the teardrop shape -->
    <clipPath id="tearClip">
      <path d="M100,12 C100,12 155,55 160,100 C165,138 140,162 100,162 C60,162 35,138 40,100 C45,55 100,12 100,12Z"/>
    </clipPath>
    <filter id="blur1">
      <feGaussianBlur stdDeviation="0.5"/>
    </filter>
  </defs>
  
  <!-- Teardrop outer border/shadow -->
  <path d="M100,10 C100,10 158,54 163,100 C168,140 142,165 100,165 C58,165 32,140 37,100 C42,54 100,10 100,10Z" fill="#C9A84C" opacity="0.3"/>
  
  <!-- Main teardrop filled area -->
  <path d="M100,13 C100,13 155,56 160,100 C165,138 140,162 100,162 C60,162 35,138 40,100 C45,56 100,13 100,13Z" fill="#D4C8A0"/>
  
  <!-- Inner scene (clipped to teardrop) -->
  <g clip-path="url(#tearClip)">
    <!-- Sky background -->
    <rect x="35" y="12" width="130" height="150" fill="url(#skyGrad)"/>
    
    <!-- Far mountains (misty) -->
    <polygon points="35,110 55,75 75,90 90,68 105,82 120,65 140,78 160,85 160,110" fill="#8AA88A" opacity="0.5"/>
    <polygon points="35,112 60,80 85,95 108,72 130,88 155,80 162,112" fill="#7A9A7A" opacity="0.4"/>
    
    <!-- Mid mountains -->
    <polygon points="35,125 65,88 88,108 108,82 132,100 155,90 162,125" fill="#5A7C5A" opacity="0.75"/>
    
    <!-- Pine trees left -->
    <polygon points="48,125 53,100 58,125" fill="#2D5A2D"/>
    <polygon points="56,125 61,108 66,125" fill="#2D5A2D"/>
    <polygon points="64,125 68,112 72,125" fill="#3A6A3A"/>
    
    <!-- Pine trees right -->
    <polygon points="135,125 140,105 145,125" fill="#2D5A2D"/>
    <polygon points="143,125 148,110 153,125" fill="#3A6A3A"/>
    <polygon points="151,125 155,112 160,125" fill="#2D5A2D"/>
    
    <!-- Large tree center-right -->
    <circle cx="128" cy="118" r="14" fill="#3D6B3D" opacity="0.85"/>
    <rect x="126" y="128" width="4" height="10" fill="#5C3A1A"/>
    
    <!-- Water/lake reflection -->
    <ellipse cx="100" cy="145" rx="45" ry="12" fill="url(#waterGrad)" opacity="0.6"/>
    <ellipse cx="100" cy="145" rx="40" ry="9" fill="#B0C8D0" opacity="0.4"/>
    
    <!-- Villa/house -->
    <rect x="82" y="120" width="36" height="22" fill="#D4C8A0"/>
    <polygon points="78,122 100,108 122,122" fill="#8B5C2A"/>
    <rect x="88" y="128" width="8" height="14" fill="#C9A84C" opacity="0.8"/>
    <!-- Windows -->
    <rect x="84" y="124" width="6" height="5" fill="#9FD0E8" opacity="0.7"/>
    <rect x="108" y="124" width="6" height="5" fill="#9FD0E8" opacity="0.7"/>
    <!-- Light glow from windows -->
    <rect x="84" y="124" width="6" height="5" fill="#FFE080" opacity="0.5"/>
    <rect x="108" y="124" width="6" height="5" fill="#FFE080" opacity="0.5"/>
    
    <!-- Birds -->
    <path d="M72,78 Q75,75 78,78" fill="none" stroke="#556655" stroke-width="0.8"/>
    <path d="M80,73 Q83,70 86,73" fill="none" stroke="#556655" stroke-width="0.8"/>
  </g>
  
  <!-- Teardrop border -->
  <path d="M100,13 C100,13 155,56 160,100 C165,138 140,162 100,162 C60,162 35,138 40,100 C45,56 100,13 100,13Z" fill="none" stroke="#C9A84C" stroke-width="2.5"/>
  
  <!-- Inner decorative petal lines (the curved lines in the logo) -->
  <path d="M100,13 C90,35 60,65 50,95" fill="none" stroke="#C9A84C" stroke-width="1.5" opacity="0.7"/>
  <path d="M100,13 C110,35 140,65 150,95" fill="none" stroke="#C9A84C" stroke-width="1.5" opacity="0.7"/>
  <path d="M100,20 C86,42 65,70 58,98" fill="none" stroke="#C9A84C" stroke-width="1" opacity="0.5"/>
  <path d="M100,20 C114,42 135,70 142,98" fill="none" stroke="#C9A84C" stroke-width="1" opacity="0.5"/>
  
  <!-- Leaf at top -->
  <path d="M100,5 C96,9 94,14 100,13 C106,14 104,9 100,5Z" fill="#2D6B2D"/>
  <line x1="100" y1="5" x2="100" y2="13" stroke="#1A4A1A" stroke-width="0.8"/>
  
  <!-- Bottom curve of teardrop -->
  <path d="M78,158 Q100,172 122,158" fill="none" stroke="#C9A84C" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Text: NAMBAN -->
  <text x="100" y="195" text-anchor="middle" font-family="'Georgia','Times New Roman',serif" font-size="28" font-weight="700" fill="#1B4332" letter-spacing="4">NAMBAN</text>
  
  <!-- Decorative lines + VILLAS -->
  <line x1="28" y1="205" x2="62" y2="205" stroke="#C9A84C" stroke-width="1"/>
  <text x="100" y="210" text-anchor="middle" font-family="'Georgia','Times New Roman',serif" font-size="12" font-weight="400" fill="#C9A84C" letter-spacing="5">VILLAS</text>
  <line x1="138" y1="205" x2="172" y2="205" stroke="#C9A84C" stroke-width="1"/>
</svg>